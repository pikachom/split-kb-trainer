<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOTEM 38-key Typing Trainer</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #242740;
    --accent: #7c83fd;
    --accent2: #fd7cf0;
    --green: #56f09f;
    --red: #ff5f6d;
    --yellow: #ffd166;
    --text: #e2e4f0;
    --text2: #8b8fa8;
    --border: #2e3250;
    --key-base: #2a2d45;
    --key-thumb: #3a2d5a;
    --key-mod: #1e3a5f;
    --key-outer: #1f2a1f;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 18px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 span { color: var(--text2); font-weight: 400; font-size: 1rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab {
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  /* ── Keyboard Visual ── */
  #keyboard-section {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .kb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .kb-title { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .layer-tabs { display: flex; gap: 4px; }
  .layer-tab {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    transition: all 0.15s;
    user-select: none;
  }
  .layer-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* keyboard layout */
  .keyboard {
    display: flex;
    justify-content: center;
    gap: 36px;
    flex-wrap: wrap;
  }
  .hand { display: flex; flex-direction: column; gap: 0; }

  /* column-stagger area: flex row of col-stacks */
  .stagger-area {
    display: flex;
    gap: 5px;
    align-items: flex-start;
  }
  .col-stack {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* thumb cluster */
  .thumb-row {
    display: flex;
    gap: 5px;
    margin-top: 7px;
    justify-content: flex-end;
    padding-right: 10px;
  }
  .thumb-row.right {
    justify-content: flex-start;
    padding-right: 0;
    padding-left: 10px;
  }

  /* Thumb key arc via margin-top */
  .thumb-row .key:nth-child(1) { margin-top: 0; transform: rotate(0deg); }
  .thumb-row .key:nth-child(2) { margin-top: 5px; transform: rotate(14deg); }
  .thumb-row .key:nth-child(3) { margin-top: 13px; transform: rotate(28deg); }
  .thumb-row.right .key:nth-child(1) { margin-top: 13px; transform: rotate(-28deg); }
  .thumb-row.right .key:nth-child(2) { margin-top: 5px; transform: rotate(-14deg); }
  .thumb-row.right .key:nth-child(3) { margin-top: 0; transform: rotate(0deg); }

  /* Keys */
  .key {
    width: 44px;
    height: 42px;
    border-radius: 5px;
    background: var(--key-base);
    border: 1px solid #3a3d5c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--text2);
    position: relative;
    transition: all 0.1s;
    cursor: default;
    user-select: none;
  }
  .key .main  { font-size: 0.82rem; color: var(--text); font-weight: 600; line-height: 1; }
  .key .hold  { font-size: 0.58rem; color: var(--accent2); position: absolute; bottom: 3px; left: 4px; line-height: 1; }
  .key .shift { font-size: 0.58rem; color: var(--text2); position: absolute; top: 3px; right: 4px; line-height: 1; }

  .key.thumb  { background: var(--key-thumb); width: 48px; }
  .key.mod    { background: var(--key-mod); }
  .key.outer  { background: var(--key-outer); border-color: #2a4a2a; }
  .key.empty  { background: transparent; border-color: transparent; }

  /* finger-color bottom border */
  .key.finger-index  { border-bottom: 2px solid #7c83fd; }
  .key.finger-middle { border-bottom: 2px solid #56f09f; }
  .key.finger-ring   { border-bottom: 2px solid #ffd166; }
  .key.finger-pinky  { border-bottom: 2px solid #ff5f6d; }
  .key.finger-thumb  { border-bottom: 2px solid #fd7cf0; }

  /* highlight states */
  .key.highlight {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(124,131,253,0.55);
  }
  .key.highlight .main, .key.highlight .hold, .key.highlight .shift { color: #fff; }
  .key.key-correct { background: var(--green); border-color: var(--green); }
  .key.key-incorrect { background: var(--red); border-color: var(--red); }

  /* ── Practice Section ── */
  #practice-section {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .mode-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .mode-btn {
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .mode-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .mode-btn:hover:not(.active) { border-color: var(--text2); color: var(--text); }

  /* stats */
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-val   { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; }

  /* text display */
  #text-display {
    font-size: 1.25rem;
    line-height: 1.8;
    font-family: 'Consolas', 'D2Coding', monospace;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    min-height: 80px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
    word-break: break-all;
    overflow-wrap: break-word;
  }
  .char { position: relative; }
  .char.done  { color: var(--green); }
  .char.error { color: var(--red); text-decoration: underline wavy var(--red); }
  .char.cursor {
    background: var(--accent);
    color: #fff;
    border-radius: 2px;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { background: transparent; color: var(--text); } }

  /* input */
  #input-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  #typing-input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 1rem;
    font-family: 'Consolas', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  #typing-input:focus { border-color: var(--accent); }

  .btn {
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary   { background: var(--accent);  color: #fff; }
  .btn-primary:hover  { background: #9399fe; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  /* progress */
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.2s; }

  /* ── Error Heatmap ── */
  #error-section {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .error-title { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  #error-list  { display: flex; flex-wrap: wrap; gap: 8px; }
  .error-key   { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .error-key-char  {
    width: 36px; height: 32px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700;
    background: var(--red); color: #fff; opacity: 0.4;
  }
  .error-key-count { font-size: 0.65rem; color: var(--text2); }

  /* Finish Modal */
  #finish-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center;
    z-index: 100;
  }
  #finish-modal.show { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    max-width: 360px; width: 90%;
  }
  .modal-box h2 { font-size: 1.4rem; margin-bottom: 8px; color: var(--green); }
  .modal-stats  { display: flex; justify-content: center; gap: 32px; margin: 20px 0; }
  .modal-stat-val   { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .modal-stat-label { font-size: 0.75rem; color: var(--text2); }
  .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }

  /* Guide legend */
  .guide-legend { margin-top: 14px; }

  footer { color: var(--text2); font-size: 0.75rem; margin-top: auto; text-align: center; }

  @media (max-width: 640px) {
    .key { width: 34px; height: 32px; }
    .key .main { font-size: 0.65rem; }
    .key.thumb { width: 38px; }
    .keyboard { gap: 20px; }
    h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<h1>⌨️ TOTEM Trainer <span>38-key col-stagger</span></h1>

<!-- Main tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchMain('practice')">연습</div>
  <div class="tab" onclick="switchMain('keymap')">키맵</div>
  <div class="tab" onclick="switchMain('guide')">손가락 가이드</div>
</div>

<!-- ══ KEYBOARD VISUAL ══ -->
<div id="keyboard-section">
  <div class="kb-header">
    <div class="kb-title">레이어 시각화</div>
    <div class="layer-tabs">
      <div class="layer-tab active"  onclick="switchLayer('base')">BASE</div>
      <div class="layer-tab"         onclick="switchLayer('nav')">NAV</div>
      <div class="layer-tab"         onclick="switchLayer('num_sym')">NUM/SYM</div>
      <div class="layer-tab"         onclick="switchLayer('device')">DEVICE</div>
    </div>
  </div>
  <div class="keyboard" id="kb-visual"></div>
</div>

<!-- ══ PRACTICE SECTION ══ -->
<div id="practice-section">
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('en')">🔤 영문</button>
    <button class="mode-btn"        onclick="setMode('ko')">🇰🇷 한글</button>
    <button class="mode-btn"        onclick="setMode('sym')">🔣 숫자/특문</button>
    <button class="mode-btn"        onclick="setMode('mix')">🌀 혼합</button>
    <button class="mode-btn"        onclick="setMode('code')">💻 코드</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="wpm-val">0</div><div class="stat-label">WPM</div></div>
    <div class="stat"><div class="stat-val" id="acc-val">100%</div><div class="stat-label">정확도</div></div>
    <div class="stat"><div class="stat-val" id="time-val">0s</div><div class="stat-label">시간</div></div>
    <div class="stat"><div class="stat-val" id="err-val">0</div><div class="stat-label">오류</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="text-display"></div>

  <div id="input-area">
    <input id="typing-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="여기에 타이핑하세요…" />
    <button class="btn btn-primary"   onclick="nextLine()">다음 ↵</button>
    <button class="btn btn-secondary" onclick="resetSession()">리셋</button>
  </div>
</div>

<!-- ══ ERROR HEATMAP ══ -->
<div id="error-section">
  <div class="error-title">❌ 오류 많은 키</div>
  <div id="error-list"><span style="color:var(--text2);font-size:0.85rem">아직 오류 없음</span></div>
</div>

<!-- Finish Modal -->
<div id="finish-modal">
  <div class="modal-box">
    <h2>🎉 완료!</h2>
    <p style="color:var(--text2);font-size:0.9rem">이번 세션 결과</p>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-wpm">0</div>
        <div class="modal-stat-label">WPM</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-acc">0%</div>
        <div class="modal-stat-label">정확도</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary"   onclick="nextLine(); closeModal()">계속하기</button>
      <button class="btn btn-secondary" onclick="resetSession(); closeModal()">다시 시작</button>
    </div>
  </div>
</div>

<footer>
  TOTEM 38-key · Base / NAV (LT1) / NUM+SYM (LT2) / DEVICE (LT1+LT2) · 한/영 IME 지원
</footer>

<script>
/* ═══════════════════════════════════════════════════════════
   KEYMAP DATA
   Sourced from: pikachom/zmk-config-totem  config/totem.keymap
   ─────────────────────────────────────────────────────────── */

// Key object: { m: tap/main label, s: shift/top-right label, h: hold label (shown bottom-left) }
// mod:true → modifier-style background
// thumb:true → thumb key style
// outer:true → outer pinky key style

const LAYERS = {
  // ── Layer 0: base ────────────────────────────────────────
  base: {
    // left[row][col]  col0=pinky(Q) … col4=inner(T)
    left: [
      [ {m:'Q'}, {m:'W'}, {m:'E'}, {m:'R'}, {m:'T'} ],
      [ {m:'A'}, {m:'S'}, {m:'D'}, {m:'F'}, {m:'G'} ],
      [ {m:'Z'}, {m:'X'}, {m:'C'}, {m:'V'}, {m:'B'} ],
    ],
    // single extra outer key on bottom-left
    leftOuter: { m:'⇧', mod:true, outer:true },
    // 3 thumb keys, left to right (inner→outer)
    leftThumb: [
      { m:'SPC', h:'⌥', thumb:true },
      { m:'SPC', h:'⌘', thumb:true },
      { m:'TAB', h:'NAV', thumb:true },
    ],
    // right[row][col]  col0=inner(Y) … col4=pinky(P)
    right: [
      [ {m:'Y'}, {m:'U'}, {m:'I'}, {m:'O'}, {m:'P'} ],
      [ {m:'H'}, {m:'J'}, {m:'K'}, {m:'L'}, {m:';', s:':'} ],
      [ {m:'N'}, {m:'M'}, {m:',', h:'⌃'}, {m:'.', h:'⌥'}, {m:'/', h:'⌘'} ],
    ],
    rightOuter: { m:"'", s:'"', outer:true },
    rightThumb: [
      { m:'ENT',  h:'SYM', thumb:true },
      { m:'BSPC', mod:true, thumb:true },
      { m:'CAPS', h:'DEV', thumb:true },
    ],
  },

  // ── Layer 1: nav (hold TAB on left thumb) ────────────────
  nav: {
    left: [
      [ {m:'ESC'}, {m:'BSPC'}, {m:'↑'},  {m:'DEL'}, {m:''} ],
      [ {m:'⌥←'},  {m:'←'},    {m:'↓'},  {m:'→'},   {m:'⌥→'} ],
      [ {m:'⌘↑'},  {m:'⌘←'},   {m:'↵'},  {m:'⌘→'},  {m:'⌘↓'} ],
    ],
    leftOuter: { m:'⇧', mod:true, outer:true },
    leftThumb: [
      { m:'SPC', h:'⌥', thumb:true },
      { m:'SPC', h:'⌘', thumb:true },
      { m:'▼',   mod:true, thumb:true },
    ],
    right: [
      [ {m:''}, {m:''}, {m:''}, {m:''}, {m:''} ],
      [ {m:''}, {m:''}, {m:''}, {m:''}, {m:''} ],
      [ {m:''}, {m:''}, {m:''}, {m:''}, {m:''} ],
    ],
    rightOuter: { m:'⇧', mod:true, outer:true },
    rightThumb: [
      { m:'ENT',  thumb:true },
      { m:'BSPC', mod:true, thumb:true },
      { m:'CAPS', thumb:true },
    ],
  },

  // ── Layer 2: num_sym (hold ENT on right thumb) ───────────
  num_sym: {
    left: [
      [ {m:'1'}, {m:'2'}, {m:'3'}, {m:'4'},        {m:'5'} ],
      [ {m:''},  {m:''},  {m:''},  {m:'-', s:'_'},  {m:'=', s:'+'} ],
      [ {m:''},  {m:''},  {m:''},  {m:''},           {m:''} ],
    ],
    leftOuter: { m:'⇧', mod:true, outer:true },
    leftThumb: [
      { m:'SPC', h:'⌥', thumb:true },
      { m:'SPC', h:'⌘', thumb:true },
      { m:'▼',   mod:true, thumb:true },
    ],
    right: [
      [ {m:'6'}, {m:'7'}, {m:'8'}, {m:'9'},          {m:'0'} ],
      [ {m:'[', s:'{'}, {m:']', s:'}'}, {m:''}, {m:''}, {m:'\\', s:'|'} ],
      [ {m:'(', s:'<'}, {m:')', s:'>'}, {m:','}, {m:'.'}, {m:'/'} ],
    ],
    rightOuter: { m:'⇧', mod:true, outer:true },
    rightThumb: [
      { m:'▼',   mod:true, thumb:true },
      { m:'BSPC', mod:true, thumb:true },
      { m:'CAPS', thumb:true },
    ],
  },

  // ── Layer 3: device (hold NAV + SYM simultaneously) ──────
  device: {
    left: [
      [ {m:''},    {m:'🔅'}, {m:'🔆'}, {m:''},    {m:''} ],
      [ {m:'🔇'}, {m:'🔉'}, {m:'🔊'}, {m:'⏯'},  {m:''} ],
      [ {m:''},    {m:''},    {m:''},    {m:''},    {m:''} ],
    ],
    leftOuter: { m:'', outer:true },
    leftThumb: [
      { m:'', thumb:true },
      { m:'', thumb:true },
      { m:'', thumb:true },
    ],
    right: [
      [ {m:'BT0'}, {m:'BT1'}, {m:'BT2'}, {m:'BT3'}, {m:'BT4'} ],
      [ {m:''},    {m:''},    {m:''},    {m:''},    {m:''} ],
      [ {m:''},    {m:''},    {m:''},    {m:''},    {m:''} ],
    ],
    rightOuter: { m:'CLR', mod:true, outer:true },
    rightThumb: [
      { m:'', thumb:true },
      { m:'', thumb:true },
      { m:'', thumb:true },
    ],
  },
};

/* ═══════════════════════════════════════════════════════════
   KEYBOARD RENDERER
   ─────────────────────────────────────────────────────────── */

// Physical y-offsets scaled ×0.18 (from totem-layouts.dtsi coordinates)
// Left hand: col0=pinky(Q), col1=ring(W), col2=middle(E/ref), col3=index(R), col4=inner(T)
const STAGGER_L = [27, 11, 0, 9, 12];  // px margin-top per col, relative to middle(E)
const STAGGER_R = [12,  9, 0, 11, 27]; // mirrored for right hand

const FINGER_L = ['pinky', 'ring', 'middle', 'index', 'index'];
const FINGER_R = ['index', 'index', 'middle', 'ring', 'pinky'];

let currentLayer = 'base';

function makeKey(k, fingerClass, highlightKey) {
  if (!k) k = {m:''};
  const el = document.createElement('div');
  const isEmpty = !k.m && !k.s && !k.h;

  let cls = 'key';
  if (isEmpty)   cls += ' empty';
  if (k.thumb)   cls += ' thumb';
  if (k.mod)     cls += ' mod';
  if (k.outer)   cls += ' outer';
  if (fingerClass && !isEmpty) cls += ` finger-${fingerClass}`;

  if (highlightKey && k.m && k.m.toLowerCase() === highlightKey.toLowerCase()) {
    cls += ' highlight';
  }

  el.className = cls;
  el.innerHTML =
    (k.s ? `<span class="shift">${k.s}</span>` : '') +
    `<span class="main">${k.m || ''}</span>` +
    (k.h ? `<span class="hold">${k.h}</span>` : '');
  return el;
}

function renderKeyboard(layer, highlightKey) {
  currentLayer = layer;
  const data = LAYERS[layer];
  const kb = document.getElementById('kb-visual');
  kb.innerHTML = '';

  const KEY_H = 42, KEY_GAP = 5;
  // outer key aligns with row-2 of the pinky column
  const outerStagger = STAGGER_L[0] + 2 * (KEY_H + KEY_GAP); // 27 + 94 = 121px

  ['left', 'right'].forEach(side => {
    const isLeft = side === 'left';
    const handDiv = document.createElement('div');
    handDiv.className = `hand ${side}`;

    const rows    = data[side];          // 3×5 array
    const stagger = isLeft ? STAGGER_L : STAGGER_R;
    const fingers = isLeft ? FINGER_L  : FINGER_R;
    const outerKey  = data[side + 'Outer'];
    const thumbKeys = data[side + 'Thumb'];

    // ── stagger area (6 column stacks: outer + 5 main) ──
    const staggerArea = document.createElement('div');
    staggerArea.className = 'stagger-area';

    // Build 6 columns
    for (let c = 0; c < 6; c++) {
      const colDiv = document.createElement('div');
      colDiv.className = 'col-stack';

      if (isLeft) {
        if (c === 0) {
          // outer key (SHIFT): single key, aligned to row 2
          colDiv.style.marginTop = outerStagger + 'px';
          colDiv.appendChild(makeKey(outerKey, 'pinky', highlightKey));
        } else {
          // main cols: c-1 maps to rows[row][c-1]
          colDiv.style.marginTop = stagger[c - 1] + 'px';
          for (let r = 0; r < rows.length; r++) {
            colDiv.appendChild(makeKey(rows[r][c - 1], fingers[c - 1], highlightKey));
          }
        }
      } else {
        // right hand: cols 0-4 are main, col 5 is outer (')
        if (c === 5) {
          colDiv.style.marginTop = outerStagger + 'px';
          colDiv.appendChild(makeKey(outerKey, 'pinky', highlightKey));
        } else {
          colDiv.style.marginTop = stagger[c] + 'px';
          for (let r = 0; r < rows.length; r++) {
            colDiv.appendChild(makeKey(rows[r][c], fingers[c], highlightKey));
          }
        }
      }

      staggerArea.appendChild(colDiv);
    }

    handDiv.appendChild(staggerArea);

    // ── thumb cluster ──
    const thumbDiv = document.createElement('div');
    thumbDiv.className = 'thumb-row' + (isLeft ? '' : ' right');
    thumbKeys.forEach(k => thumbDiv.appendChild(makeKey(k, 'thumb', highlightKey)));
    handDiv.appendChild(thumbDiv);

    kb.appendChild(handDiv);
  });
}

function switchLayer(layer) {
  document.querySelectorAll('.layer-tab').forEach(t => {
    const map = {BASE:'base', NAV:'nav', 'NUM/SYM':'num_sym', DEVICE:'device'};
    t.classList.toggle('active', map[t.textContent] === layer);
  });
  renderKeyboard(layer);
}

/* ═══════════════════════════════════════════════════════════
   PRACTICE ENGINE
   ─────────────────────────────────────────────────────────── */
let mode = 'en';
let lines = [];
let lineIdx = 0;
let currentText = '';
let typed = '';
let errors = {};
let startTime = null;
let timerInterval = null;
let totalChars = 0;
let totalErrors = 0;
let sessionActive = false;
let composing = false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  // switch layer hint
  const layerHint = { en:'base', ko:'base', sym:'num_sym', mix:'base', code:'num_sym' };
  switchLayer(layerHint[m] || 'base');
  resetSession();
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetSession() {
  clearInterval(timerInterval);
  lines       = shuffleArray(TEXTS[mode]);
  lineIdx     = 0;
  typed       = '';
  errors      = {};
  totalChars  = 0;
  totalErrors = 0;
  startTime   = null;
  sessionActive = false;
  updateStats(0, 100, 0, 0);
  document.getElementById('progress-fill').style.width = '0%';
  loadLine();
  updateErrorHeatmap();
  document.getElementById('typing-input').value = '';
  document.getElementById('typing-input').focus();
}

function loadLine() {
  currentText = lines[lineIdx % lines.length];
  typed = '';
  renderText();
  renderKeyboard(currentLayer, currentText[0]);
}

function renderText() {
  const display = document.getElementById('text-display');
  display.innerHTML = currentText.split('').map((ch, i) => {
    let cls = 'char';
    if (i < typed.length)     cls += typed[i] === ch ? ' done' : ' error';
    else if (i === typed.length) cls += ' cursor';
    const esc = ch === ' ' ? '&nbsp;' :
      ch.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<span class="${cls}">${esc}</span>`;
  }).join('');

  // highlight next key on keyboard
  if (typed.length < currentText.length) {
    renderKeyboard(currentLayer, currentText[typed.length]);
  }

  // progress
  const pct = (lineIdx / lines.length) * 100 +
              (typed.length / currentText.length) * (100 / lines.length);
  document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';
}

function handleInput(e) {
  if (composing) return;
  const inp = e.target;
  const val = inp.value;

  if (!sessionActive && val.length > 0) {
    sessionActive = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 500);
  }

  typed = val;

  for (let i = 0; i < val.length; i++) {
    if (i < currentText.length && val[i] !== currentText[i]) {
      const errKey = currentText[i];
      errors[errKey] = (errors[errKey] || 0) + 1;
    }
  }

  renderText();
  updateErrorHeatmap();

  if (val === currentText) {
    totalChars += currentText.length;
    for (let i = 0; i < val.length; i++) {
      if (val[i] !== currentText[i]) totalErrors++;
    }
    inp.value = '';
    nextLine();
  } else if (val.length > currentText.length) {
    inp.value = val.slice(0, currentText.length);
  }
}

function handleKeydown(e) {
  if (e.key === 'Enter') {
    const val = e.target.value;
    let correct = 0;
    for (let i = 0; i < Math.min(val.length, currentText.length); i++) {
      if (val[i] === currentText[i]) correct++;
    }
    if (correct >= currentText.length * 0.8) {
      totalChars += correct;
      e.target.value = '';
      nextLine();
      e.preventDefault();
    }
  }
}

function nextLine() {
  lineIdx++;
  typed = '';
  document.getElementById('typing-input').value = '';

  if (lineIdx >= lines.length) {
    clearInterval(timerInterval);
    const elapsed = startTime ? (Date.now() - startTime) / 1000 : 1;
    const wpm = Math.round((totalChars / 5) / (elapsed / 60));
    const acc = totalChars > 0 ? Math.round(((totalChars - totalErrors) / totalChars) * 100) : 100;
    document.getElementById('modal-wpm').textContent = wpm;
    document.getElementById('modal-acc').textContent = acc + '%';
    document.getElementById('finish-modal').classList.add('show');
    lines = shuffleArray(TEXTS[mode]);
    lineIdx = 0;
    return;
  }
  loadLine();
}

function closeModal() {
  document.getElementById('finish-modal').classList.remove('show');
}

function updateTimer() {
  if (!startTime) return;
  const elapsed = (Date.now() - startTime) / 1000;
  const wpm = totalChars > 0 ? Math.round((totalChars / 5) / (elapsed / 60)) : 0;
  const acc = totalChars > 0 ? Math.round(((totalChars - totalErrors) / totalChars) * 100) : 100;
  updateStats(wpm, acc, Math.round(elapsed), totalErrors);
}

function updateStats(wpm, acc, time, errs) {
  document.getElementById('wpm-val').textContent  = wpm;
  document.getElementById('acc-val').textContent  = acc + '%';
  document.getElementById('time-val').textContent = time + 's';
  document.getElementById('err-val').textContent  = errs;
}

function updateErrorHeatmap() {
  const el = document.getElementById('error-list');
  const sorted = Object.entries(errors).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) {
    el.innerHTML = '<span style="color:var(--text2);font-size:0.85rem">아직 오류 없음</span>';
    return;
  }
  const max = sorted[0][1];
  el.innerHTML = sorted.slice(0, 20).map(([ch, cnt]) => {
    const opacity = 0.3 + 0.7 * (cnt / max);
    const disp = ch === ' ' ? '␣' : ch;
    return `<div class="error-key">
      <div class="error-key-char" style="opacity:${opacity}">${disp}</div>
      <div class="error-key-count">×${cnt}</div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   IME (Korean) handling
   ─────────────────────────────────────────────────────────── */
function initInput() {
  const inp = document.getElementById('typing-input');
  inp.addEventListener('compositionstart', () => { composing = true; });
  inp.addEventListener('compositionend',   (e) => { composing = false; handleInput(e); });
  inp.addEventListener('input',            (e) => { if (!composing) handleInput(e); });
  inp.addEventListener('keydown',          handleKeydown);
}

function switchMain(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['practice','keymap','guide'][i] === tab);
  });
  const ps = document.getElementById('practice-section');
  const es = document.getElementById('error-section');

  if (tab === 'practice') {
    ps.style.display = '';
    es.style.display = '';
    renderKeyboard(currentLayer);
  } else if (tab === 'keymap') {
    ps.style.display = 'none';
    es.style.display = 'none';
    document.querySelector('.kb-title').textContent = '전체 키맵 참조';
    renderKeyboard('base');
  } else if (tab === 'guide') {
    ps.style.display = 'none';
    es.style.display = 'none';
    document.querySelector('.kb-title').textContent = '손가락 컬러 가이드';
    renderGuide();
  }
}
