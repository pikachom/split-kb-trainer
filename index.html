<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스플릿 키보드 타자연습 | Split KB Trainer</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #242740;
    --accent: #7c83fd;
    --accent2: #fd7cf0;
    --green: #56f09f;
    --red: #ff5f6d;
    --yellow: #ffd166;
    --text: #e2e4f0;
    --text2: #8b8fa8;
    --border: #2e3250;
    --key-base: #2a2d45;
    --key-thumb: #3a2d5a;
    --key-mod: #1e3a5f;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 20px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 span { color: var(--text2); font-weight: 400; font-size: 1rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab {
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  /* ── Keyboard Visual ── */
  #keyboard-section {
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .kb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .kb-title { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .layer-tabs { display: flex; gap: 4px; }
  .layer-tab {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .layer-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .keyboard {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .hand { display: flex; flex-direction: column; gap: 4px; }
  .kb-row { display: flex; gap: 4px; }

  /* Column stagger offsets (left hand) */
  .hand.left .kb-row:nth-child(1) { padding-left: 4px; }
  .hand.left .kb-row:nth-child(2) { padding-left: 0px; }
  .hand.left .kb-row:nth-child(3) { padding-left: 8px; }
  /* right hand mirror */
  .hand.right .kb-row:nth-child(1) { padding-right: 4px; }
  .hand.right .kb-row:nth-child(2) { padding-right: 0px; }
  .hand.right .kb-row:nth-child(3) { padding-right: 8px; }

  .thumb-row { display: flex; gap: 4px; justify-content: flex-end; margin-top: 4px; }
  .hand.right .thumb-row { justify-content: flex-start; }

  .key {
    width: 44px;
    height: 40px;
    border-radius: 5px;
    background: var(--key-base);
    border: 1px solid #3a3d5c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--text2);
    position: relative;
    transition: all 0.1s;
    cursor: default;
    user-select: none;
  }
  .key .main { font-size: 0.8rem; color: var(--text); font-weight: 500; }
  .key .shift { font-size: 0.6rem; color: var(--text2); position: absolute; top: 3px; right: 5px; }
  .key .fn { font-size: 0.6rem; color: var(--accent2); position: absolute; bottom: 3px; left: 4px; }

  .key.thumb { background: var(--key-thumb); width: 52px; }
  .key.mod { background: var(--key-mod); color: var(--accent); }
  .key.highlight { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(124,131,253,0.6); }
  .key.highlight .main, .key.highlight .shift { color: #fff; }
  .key.correct { background: var(--green); border-color: var(--green); }
  .key.incorrect { background: var(--red); border-color: var(--red); }
  .key.finger-index { border-bottom: 2px solid #7c83fd; }
  .key.finger-middle { border-bottom: 2px solid #56f09f; }
  .key.finger-ring { border-bottom: 2px solid #ffd166; }
  .key.finger-pinky { border-bottom: 2px solid #ff5f6d; }
  .key.finger-thumb { border-bottom: 2px solid #fd7cf0; }

  /* ── Practice Section ── */
  #practice-section {
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .mode-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .mode-btn {
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .mode-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .mode-btn:hover:not(.active) { border-color: var(--text2); color: var(--text); }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; }

  /* Text display */
  #text-display {
    font-size: 1.25rem;
    line-height: 1.8;
    font-family: 'Consolas', 'D2Coding', monospace;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    min-height: 80px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
    word-break: break-all;
    overflow-wrap: break-word;
  }
  .char { position: relative; }
  .char.done { color: var(--green); }
  .char.error { color: var(--red); text-decoration: underline wavy var(--red); }
  .char.cursor {
    background: var(--accent);
    color: #fff;
    border-radius: 2px;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { background: transparent; color: var(--text); } }

  /* Input area */
  #input-area {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  #typing-input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 1rem;
    font-family: 'Consolas', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  #typing-input:focus { border-color: var(--accent); }
  #typing-input.error-flash { border-color: var(--red); }

  .btn {
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9399fe; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  /* Progress */
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.2s;
  }

  /* ── Error heatmap ── */
  #error-section {
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .error-title { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  #error-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .error-key {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .error-key-char {
    width: 36px;
    height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 700;
    background: var(--red);
    color: #fff;
    opacity: 0.4;
  }
  .error-key-count { font-size: 0.65rem; color: var(--text2); }

  /* Finish modal */
  #finish-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #finish-modal.show { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    max-width: 360px;
    width: 90%;
  }
  .modal-box h2 { font-size: 1.4rem; margin-bottom: 8px; color: var(--green); }
  .modal-stats { display: flex; justify-content: center; gap: 32px; margin: 20px 0; }
  .modal-stat-val { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .modal-stat-label { font-size: 0.75rem; color: var(--text2); }
  .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }

  footer { color: var(--text2); font-size: 0.75rem; margin-top: auto; }
</style>
</head>
<body>

<h1>⌨️ Split KB Trainer <span>Corne 38-key</span></h1>

<!-- Main tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchMain('practice')">연습</div>
  <div class="tab" onclick="switchMain('keymap')">키맵</div>
  <div class="tab" onclick="switchMain('guide')">손가락 가이드</div>
</div>

<!-- ══ KEYBOARD VISUAL ══ -->
<div id="keyboard-section">
  <div class="kb-header">
    <div class="kb-title">🖧 레이어 시각화</div>
    <div class="layer-tabs">
      <div class="layer-tab active" onclick="switchLayer('base')">Base</div>
      <div class="layer-tab" onclick="switchLayer('lower')">Lower</div>
      <div class="layer-tab" onclick="switchLayer('raise')">Raise</div>
    </div>
  </div>
  <div class="keyboard" id="kb-visual"></div>
</div>

<!-- ══ PRACTICE SECTION ══ -->
<div id="practice-section">
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('en')">🔤 영문</button>
    <button class="mode-btn" onclick="setMode('ko')">🇰🇷 한글</button>
    <button class="mode-btn" onclick="setMode('sym')">🔣 특수문자</button>
    <button class="mode-btn" onclick="setMode('mix')">🌀 혼합</button>
    <button class="mode-btn" onclick="setMode('layer')">🔲 레이어 연습</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="wpm-val">0</div><div class="stat-label">WPM</div></div>
    <div class="stat"><div class="stat-val" id="acc-val">100%</div><div class="stat-label">정확도</div></div>
    <div class="stat"><div class="stat-val" id="time-val">0s</div><div class="stat-label">시간</div></div>
    <div class="stat"><div class="stat-val" id="err-val">0</div><div class="stat-label">오류</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div id="text-display"></div>

  <div id="input-area">
    <input id="typing-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="여기에 타이핑하세요..." />
    <button class="btn btn-primary" onclick="nextLine()">다음 ↵</button>
    <button class="btn btn-secondary" onclick="resetSession()">리셋</button>
  </div>
</div>

<!-- ══ ERROR HEATMAP ══ -->
<div id="error-section">
  <div class="error-title">❌ 오류 많은 키</div>
  <div id="error-list"><span style="color:var(--text2);font-size:0.85rem">아직 오류 없음</span></div>
</div>

<!-- Finish Modal -->
<div id="finish-modal">
  <div class="modal-box">
    <h2>🎉 완료!</h2>
    <p style="color:var(--text2);font-size:0.9rem">이번 세션 결과</p>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-wpm">0</div>
        <div class="modal-stat-label">WPM</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-acc">0%</div>
        <div class="modal-stat-label">정확도</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="nextLine(); closeModal()">계속하기</button>
      <button class="btn btn-secondary" onclick="resetSession(); closeModal()">다시 시작</button>
    </div>
  </div>
</div>

<footer>Corne 38-key (3×6 col-stagger) • Base / Lower / Raise layers • 한/영/특문 혼합</footer>

<script>
/* ═══════════════════════════════════════════════
   KEYMAP DATA
   ─────────────────────────────────────────────── */
const LAYERS = {
  base: {
    left: [
      // row 0 (top)
      [{m:'Q',s:'',f:''},{m:'W',s:'',f:''},{m:'E',s:'',f:''},{m:'R',s:'',f:''},{m:'T',s:'',f:''}],
      // row 1
      [{m:'A',s:'',f:''},{m:'S',s:'',f:''},{m:'D',s:'',f:''},{m:'F',s:'',f:''},{m:'G',s:'',f:''}],
      // row 2
      [{m:'Z',s:'',f:''},{m:'X',s:'',f:''},{m:'C',s:'',f:''},{m:'V',s:'',f:''},{m:'B',s:'',f:''}],
    ],
    leftThumb: [{m:'DEL',s:'',f:'',mod:true},{m:'SPC',s:'',f:'',thumb:true},{m:'LWR',s:'',f:'',mod:true}],
    right: [
      [{m:'Y',s:'',f:''},{m:'U',s:'',f:''},{m:'I',s:'',f:''},{m:'O',s:'',f:''},{m:'P',s:'',f:''}],
      [{m:'H',s:'',f:''},{m:'J',s:'',f:''},{m:'K',s:'',f:''},{m:'L',s:'',f:''},{m:';',s:':',f:''}],
      [{m:'N',s:'',f:''},{m:'M',s:'',f:''},{m:',',s:'<',f:''},{m:'.',s:'>',f:''},{m:'/',s:'?',f:''}],
    ],
    rightThumb: [{m:'RSE',s:'',f:'',mod:true},{m:'ENT',s:'',f:'',thumb:true},{m:'BSP',s:'',f:'',mod:true}],
  },
  lower: {
    left: [
      [{m:'!',s:'',f:''},{m:'@',s:'',f:''},{m:'#',s:'',f:''},{m:'$',s:'',f:''},{m:'%',s:'',f:''}],
      [{m:'1',s:'!',f:''},{m:'2',s:'@',f:''},{m:'3',s:'#',f:''},{m:'4',s:'$',f:''},{m:'5',s:'%',f:''}],
      [{m:'`',s:'~',f:''},{m:'-',s:'_',f:''},{m:'=',s:'+',f:''},{m:'[',s:'{',f:''},{m:']',s:'}',f:''}],
    ],
    leftThumb: [{m:'DEL',mod:true},{m:'SPC',thumb:true},{m:'▼',mod:true}],
    right: [
      [{m:'^',s:'',f:''},{m:'&',s:'',f:''},{m:'*',s:'',f:''},{m:'(',s:'',f:''},{m:')',s:'',f:''}],
      [{m:'6',s:'^',f:''},{m:'7',s:'&',f:''},{m:'8',s:'*',f:''},{m:'9',s:'(',f:''},{m:'0',s:')',f:''}],
      [{m:"'",s:'"',f:''},{m:'\\',s:'|',f:''},{m:',',s:'<',f:''},{m:'.',s:'>',f:''},{m:'/',s:'?',f:''}],
    ],
    rightThumb: [{m:'RSE',mod:true},{m:'ENT',thumb:true},{m:'BSP',mod:true}],
  },
  raise: {
    left: [
      [{m:'ESC',s:'',f:''},{m:'',s:'',f:''},{m:'↑',s:'',f:''},{m:'',s:'',f:''},{m:'PgU',s:'',f:''}],
      [{m:'TAB',s:'',f:''},{m:'←',s:'',f:''},{m:'↓',s:'',f:''},{m:'→',s:'',f:''},{m:'PgD',s:'',f:''}],
      [{m:'CAP',s:'',f:''},{m:'',s:'',f:''},{m:'',s:'',f:''},{m:'',s:'',f:''},{m:'',s:'',f:''}],
    ],
    leftThumb: [{m:'DEL',mod:true},{m:'SPC',thumb:true},{m:'LWR',mod:true}],
    right: [
      [{m:'F1',s:'',f:''},{m:'F2',s:'',f:''},{m:'F3',s:'',f:''},{m:'F4',s:'',f:''},{m:'F5',s:'',f:''}],
      [{m:'F6',s:'',f:''},{m:'F7',s:'',f:''},{m:'F8',s:'',f:''},{m:'F9',s:'',f:''},{m:'F10',s:'',f:''}],
      [{m:'F11',s:'',f:''},{m:'F12',s:'',f:''},{m:'',s:'',f:''},{m:'',s:'',f:''},{m:'',s:'',f:''}],
    ],
    rightThumb: [{m:'▼',mod:true},{m:'ENT',thumb:true},{m:'BSP',mod:true}],
  },
};

// Finger assignment per column (0-4 = left hand cols, 5-9 = right hand cols after mirror)
const FINGER_LEFT  = ['pinky','ring','middle','index','index'];
const FINGER_RIGHT = ['index','index','middle','ring','pinky'];

let currentLayer = 'base';

function renderKeyboard(layer, highlightKey) {
  const data = LAYERS[layer];
  const kb = document.getElementById('kb-visual');
  kb.innerHTML = '';

  function makeKey(k, fingerClass) {
    const d = document.createElement('div');
    d.className = 'key' + (k.thumb ? ' thumb' : '') + (k.mod ? ' mod' : '') +
                  (fingerClass ? ` finger-${fingerClass}` : '');
    if (highlightKey) {
      const kMain = (k.m || '').toLowerCase();
      if (kMain === highlightKey.toLowerCase()) {
        d.classList.add('highlight');
      }
    }
    d.innerHTML = `<span class="main">${k.m||''}</span>` +
                  (k.s ? `<span class="shift">${k.s}</span>` : '') +
                  (k.f ? `<span class="fn">${k.f}</span>` : '');
    return d;
  }

  // Left hand
  const leftDiv = document.createElement('div');
  leftDiv.className = 'hand left';
  data.left.forEach((row, ri) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    row.forEach((k, ci) => rowDiv.appendChild(makeKey(k, FINGER_LEFT[ci])));
    leftDiv.appendChild(rowDiv);
  });
  const ltDiv = document.createElement('div');
  ltDiv.className = 'thumb-row';
  data.leftThumb.forEach(k => ltDiv.appendChild(makeKey(k, 'thumb')));
  leftDiv.appendChild(ltDiv);

  // Right hand
  const rightDiv = document.createElement('div');
  rightDiv.className = 'hand right';
  data.right.forEach((row, ri) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    row.forEach((k, ci) => rowDiv.appendChild(makeKey(k, FINGER_RIGHT[ci])));
    rightDiv.appendChild(rowDiv);
  });
  const rtDiv = document.createElement('div');
  rtDiv.className = 'thumb-row';
  data.rightThumb.forEach(k => rtDiv.appendChild(makeKey(k, 'thumb')));
  rightDiv.appendChild(rtDiv);

  kb.appendChild(leftDiv);
  kb.appendChild(rightDiv);
}

function switchLayer(layer) {
  currentLayer = layer;
  document.querySelectorAll('.layer-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase().startsWith(layer.substring(0,1)) &&
      (layer==='base'&&t.textContent==='Base' || layer==='lower'&&t.textContent==='Lower' || layer==='raise'&&t.textContent==='Raise'));
  });
  renderKeyboard(layer);
}

/* ═══════════════════════════════════════════════
   PRACTICE DATA
   ─────────────────────────────────────────────── */
const TEXTS = {
  en: [
    "the quick brown fox jumps over the lazy dog",
    "pack my box with five dozen liquor jugs",
    "how vexingly quick daft zebras jump",
    "sphinx of black quartz judge my vow",
    "the five boxing wizards jump quickly",
    "we promptly judged antique ivory buckles for the next prize",
    "split keyboards reduce hand travel and improve comfort",
    "column stagger aligns your fingers to natural typing positions",
    "practice makes perfect with any new keyboard layout",
    "home row keys are the foundation of touch typing",
  ],
  ko: [
    "다람쥐 헌 쳇바퀴에 타고파",
    "키보드 연습은 매일 꾸준히 하는 것이 중요합니다",
    "스플릿 키보드는 손목 건강에 도움이 됩니다",

    "레이어 키를 활용하면 손을 덜 움직여도 됩니다",

/* ═══════════════════════════════════════════════
   PRACTICE ENGINE
   ─────────────────────────────────────────────── */
let mode = 'en';
let lines = [];
let lineIdx = 0;
let currentText = '';
let typed = '';
let errors = {};
let startTime = null;
let timerInterval = null;
let totalChars = 0;
let totalErrors = 0;
let sessionActive = false;
let composing = false; // IME composing

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  resetSession();
  // Switch layer hint for layer mode
  if (m === 'layer') switchLayer('lower');
  else switchLayer('base');
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetSession() {
  clearInterval(timerInterval);
  lines = shuffleArray(TEXTS[mode]);
  lineIdx = 0;
  typed = '';
  errors = {};
  totalChars = 0;
  totalErrors = 0;
  startTime = null;
  sessionActive = false;
  updateStats(0, 100, 0, 0);
  document.getElementById('progress-fill').style.width = '0%';
  loadLine();
  updateErrorHeatmap();
  document.getElementById('typing-input').value = '';
  document.getElementById('typing-input').focus();
}

function loadLine() {
  currentText = lines[lineIdx % lines.length];
  typed = '';
  renderText();
  renderKeyboard(currentLayer, currentText[0]);
}

function renderText() {
  const display = document.getElementById('text-display');
  display.innerHTML = currentText.split('').map((ch, i) => {
    let cls = 'char';
    if (i < typed.length) {
      cls += typed[i] === ch ? ' done' : ' error';
    } else if (i === typed.length) {
      cls += ' cursor';
    }
    const esc = ch === ' ' ? '&nbsp;' : ch.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<span class="${cls}">${esc}</span>`;
  }).join('');

  // highlight next key
  if (typed.length < currentText.length) {
    const nextChar = currentText[typed.length];
    renderKeyboard(currentLayer, nextChar);
  }

  // progress
  const pct = lineIdx / lines.length * 100 + (typed.length / currentText.length) * (100 / lines.length);
  document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';
}

function handleInput(e) {
  if (composing) return;
  const inp = e.target;
  const val = inp.value;

  if (!sessionActive && val.length > 0) {
    sessionActive = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 500);
  }

  // Korean IME: compare char by char
  // For non-Korean we do char-by-char matching
  typed = val;

  // Check errors for each typed char
  for (let i = 0; i < val.length; i++) {
    if (i < currentText.length && val[i] !== currentText[i]) {
      const errKey = currentText[i];
      errors[errKey] = (errors[errKey] || 0) + 1;
    }
  }

  renderText();
  updateErrorHeatmap();

  // Auto-advance on space if last word, or on full match
  if (val === currentText) {
    totalChars += currentText.length;
    // Count errors in this line
    for (let i = 0; i < val.length; i++) {
      if (val[i] !== currentText[i]) totalErrors++;
    }
    inp.value = '';
    inp.classList.add('correct-flash');
    setTimeout(() => inp.classList.remove('correct-flash'), 200);
    nextLine();
  } else if (val.length > currentText.length) {
    inp.value = val.slice(0, currentText.length);
  }
}

function handleKeydown(e) {
  if (e.key === 'Enter') {
    // Allow enter to advance if mostly done (>80% typed correctly)
    const val = e.target.value;
    let correct = 0;
    for (let i = 0; i < Math.min(val.length, currentText.length); i++) {
      if (val[i] === currentText[i]) correct++;
    }
    if (correct >= currentText.length * 0.8) {
      totalChars += correct;
      e.target.value = '';
      nextLine();
      e.preventDefault();
    }
  }
}

function nextLine() {
  lineIdx++;
  typed = '';
  document.getElementById('typing-input').value = '';

  if (lineIdx >= lines.length) {
    // Session complete
    clearInterval(timerInterval);
    const elapsed = startTime ? (Date.now() - startTime) / 1000 : 1;
    const wpm = Math.round((totalChars / 5) / (elapsed / 60));
    const acc = totalChars > 0 ? Math.round(((totalChars - totalErrors) / totalChars) * 100) : 100;
    document.getElementById('modal-wpm').textContent = wpm;
    document.getElementById('modal-acc').textContent = acc + '%';
    document.getElementById('finish-modal').classList.add('show');
    lines = shuffleArray(TEXTS[mode]);
    lineIdx = 0;
    return;
  }
  loadLine();
}

function closeModal() {
  document.getElementById('finish-modal').classList.remove('show');
}

function updateTimer() {
  if (!startTime) return;
  const elapsed = (Date.now() - startTime) / 1000;
  const wpm = totalChars > 0 ? Math.round((totalChars / 5) / (elapsed / 60)) : 0;
  const acc = totalChars > 0 ? Math.round(((totalChars - totalErrors) / totalChars) * 100) : 100;
  updateStats(wpm, acc, Math.round(elapsed), totalErrors);
}

function updateStats(wpm, acc, time, errs) {
  document.getElementById('wpm-val').textContent = wpm;
  document.getElementById('acc-val').textContent = acc + '%';
  document.getElementById('time-val').textContent = time + 's';
  document.getElementById('err-val').textContent = errs;
}

function updateErrorHeatmap() {
  const el = document.getElementById('error-list');
  const sorted = Object.entries(errors).sort((a,b) => b[1]-a[1]);
  if (sorted.length === 0) {
    el.innerHTML = '<span style="color:var(--text2);font-size:0.85rem">아직 오류 없음</span>';
    return;
  }
  const max = sorted[0][1];
  el.innerHTML = sorted.slice(0,20).map(([ch, cnt]) => {
    const opacity = 0.3 + 0.7 * (cnt / max);
    const disp = ch === ' ' ? '␣' : ch;
    return `<div class="error-key">
      <div class="error-key-char" style="opacity:${opacity}">${disp}</div>
      <div class="error-key-count">×${cnt}</div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════
   IME (Korean) handling
   ─────────────────────────────────────────────── */
function initInput() {
  const inp = document.getElementById('typing-input');
  inp.addEventListener('compositionstart', () => { composing = true; });
  inp.addEventListener('compositionend', (e) => {
    composing = false;
    handleInput(e);
  });
  inp.addEventListener('input', (e) => {
    if (!composing) handleInput(e);
  });
  inp.addEventListener('keydown', handleKeydown);
}

/* ═══════════════════════════════════════════════
   MAIN TAB SWITCHING
   ─────────────────────────────────────────────── */
function switchMain(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['practice','keymap','guide'];
    t.classList.toggle('active', names[i] === tab);
  });
  const ps = document.getElementById('practice-section');
  const es = document.getElementById('error-section');
  const ks = document.getElementById('keyboard-section');

  if (tab === 'practice') {
    ps.style.display = '';
    es.style.display = '';
    ks.style.display = '';
  } else if (tab === 'keymap') {
    ps.style.display = 'none';
    es.style.display = 'none';
    ks.style.display = '';
    // Show all layers info
    renderKeymapPage();
  } else if (tab === 'guide') {
    ps.style.display = 'none';
    es.style.display = 'none';
    ks.style.display = '';
    renderGuide();
  }
}

function renderKeymapPage() {
  const kb = document.getElementById('keyboard-section');
  kb.querySelector('.kb-title').textContent = '📋 전체 키맵 참조';
  renderKeyboard('base');
}

function renderGuide() {
  const kb = document.getElementById('keyboard-section');
  kb.querySelector('.kb-title').textContent = '🖐 손가락 컬러 가이드';
  // Color legend
  const legendHTML = `
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:12px">
      <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:4px;background:#7c83fd;border-radius:2px"></div><span style="font-size:0.8rem;color:var(--text2)">검지 (Index)</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:4px;background:#56f09f;border-radius:2px"></div><span style="font-size:0.8rem;color:var(--text2)">중지 (Middle)</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:4px;background:#ffd166;border-radius:2px"></div><span style="font-size:0.8rem;color:var(--text2)">약지 (Ring)</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:4px;background:#ff5f6d;border-radius:2px"></div><span style="font-size:0.8rem;color:var(--text2)">소지 (Pinky)</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:4px;background:#fd7cf0;border-radius:2px"></div><span style="font-size:0.8rem;color:var(--text2)">엄지 (Thumb)</span></div>
    </div>
    <p style="margin-top:10px;font-size:0.82rem;color:var(--text2);line-height:1.6">
      ⚡ 컬럼 스태거 팁: 각 열(column)이 손가락 길이에 맞게 세로로 어긋나 있어요.<br>
      손을 수직으로 내려찍듯 치면 훨씬 편합니다.<br>
      👍 엄지키(Lower/Raise)를 누른 상태에서 다른 키를 누르면 레이어가 전환돼요.
    </p>
  `;
  const existing = kb.querySelector('.guide-legend');
  if (!existing) {
    const d = document.createElement('div');
    d.className = 'guide-legend';
    d.innerHTML = legendHTML;
    kb.appendChild(d);
  }
  renderKeyboard('base');
}

/* ═══════════════════════════════════════════════
   INIT
   ─────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  renderKeyboard('base');
  resetSession();
  initInput();
  document.getElementById('typing-input').focus();
});
</script>
